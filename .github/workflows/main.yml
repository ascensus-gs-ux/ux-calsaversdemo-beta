name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Install React peer dependencies
        run: npm install react@18.3.1 react-dom@18.3.1 --legacy-peer-deps

      - name: Build project
        run: npm run build

      - name: Copy standalone employer pages into build output
        run: |
          cp employer-overview.html dist/
          mkdir -p dist/src/assets
          cp src/assets/Hero.png dist/src/assets/
          cp src/assets/360-cycle-image.svg dist/src/assets/
          cp src/assets/180-linear-image.svg dist/src/assets/
          cp -r employers dist/

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload build artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
